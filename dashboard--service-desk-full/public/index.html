<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业金融服务台运维监控仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F5F7FA;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #3370FF 0%, #0D47A1 100%);
            color: white;
            padding: 24px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header .update-time {
            font-size: 14px;
            opacity: 0.9;
        }
        .card-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card .label {
            font-size: 14px;
            color: #646A7B;
            margin-bottom: 8px;
        }
        .card .value {
            font-size: 32px;
            font-weight: 700;
            color: #3370FF;
        }
        .card .sub {
            font-size: 13px;
            color: #969BAB;
            margin-top: 4px;
        }
        .chart-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #1F2329;
            margin-bottom: 16px;
        }
        .chart {
            height: 280px;
        }
        .info-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .info-title {
            font-size: 16px;
            font-weight: 600;
            color: #1F2329;
            margin-bottom: 16px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #F1F3F5;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #646A7B;
        }
        .stat-value {
            font-weight: 600;
            color: #1F2329;
        }
        .legend {
            margin-top: 12px;
            font-size: 13px;
            color: #969BAB;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 产业金融服务台运维监控仪表盘</h1>
            <div class="update-time">数据更新：2026-05-08 09:10:01</div>
        </div>
        
        <div class="card-row">
            <div class="card">
                <div class="label">📋 总工单数</div>
                <div class="value">976</div>
                <div class="sub">近30天累计</div>
            </div>
            <div class="card">
                <div class="label">✅ 已解决</div>
                <div class="value">946</div>
                <div class="sub">解决率 96.9%</div>
            </div>
            <div class="card">
                <div class="label">⏳ 处理中</div>
                <div class="value">30</div>
                <div class="sub">需要关注</div>
            </div>
            <div class="card">
                <div class="label">😊 满意率</div>
                <div class="value">24.5%</div>
                <div class="sub">已评价工单</div>
            </div>
        </div>
        
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">📈 工单阶段分布</div>
                <div class="chart" id="stageChart"></div>
                <div class="legend">人工处理 / 机器人关闭 / 处理中</div>
            </div>
            <div class="chart-card">
                <div class="chart-title">😊 满意度分布</div>
                <div class="chart" id="scoreChart"></div>
                <div class="legend">已评价：满意 / 一般 / 不满意</div>
            </div>
        </div>
        
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">📱 工单渠道分布</div>
                <div class="chart" id="channelChart"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">📅 每日工单创建趋势（近30天）</div>
                <div class="chart" id="dailyChart"></div>
            </div>
        </div>
        
        <div class="info-row">
            <div class="info-card">
                <div class="info-title">⏱️ 响应时效统计</div>
                <div class="stat-item">
                    <span class="stat-label"><1分钟</span>
                    <span class="stat-value">0条</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">1-5分钟</span>
                    <span class="stat-value">0条</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">5-15分钟</span>
                    <span class="stat-value">0条</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">15-30分钟</span>
                    <span class="stat-value">0条</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">30-60分钟</span>
                    <span class="stat-value">0条</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">>1小时</span>
                    <span class="stat-value">0条</span>
                </div>
            </div>
            <div class="info-card">
                <div class="info-title">🔗 相关链接</div>
                <div class="stat-item">
                    <span class="stat-label">多维表格</span>
                    <span class="stat-value"><a href="https://haidgroup.feishu.cn/base/REDACTED" target="_blank">查看</a></span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">服务台</span>
                    <span class="stat-value"><a href="https://haidgroup.feishu.cn/serviceDesk/base/7036997285364023297" target="_blank">查看</a></span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">工单分析报告</span>
                    <span class="stat-value"><a href="https://haidgroup.feishu.cn/wiki/M2rnwOROBiZQbLkg5Eoclvz5nsg" target="_blank">查看</a></span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 工单阶段饼图
        var stageChart = echarts.init(document.getElementById('stageChart'));
        stageChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            color: ['#3370FF', '#00B42A', '#FF7D00'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: true, formatter: '{b}\n{c}条' },
                data: [{"name": "\u4eba\u5de5", "value": 585}, {"name": "\u673a\u5668\u4eba", "value": 362}, {"name": "\u5904\u7406\u4e2d", "value": 29}]
            }]
        });
        
        // 满意度饼图
        var scoreChart = echarts.init(document.getElementById('scoreChart'));
        scoreChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            color: ['#00B42A', '#FF7D00', '#F53F3F', '#86909C'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: true, formatter: '{b}\n{c}条' },
                data: [{"name": "\u672a\u8bc4\u5206", "value": 724}, {"name": "\u6ee1\u610f", "value": 239}, {"name": "\u4e00\u822c", "value": 12}, {"name": "\u4e0d\u6ee1\u610f", "value": 1}]
            }]
        });
        
        // 渠道饼图
        var channelChart = echarts.init(document.getElementById('channelChart'));
        channelChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            color: ['#3370FF', '#00B42A', '#F53F3F', '#FF7D00', '#722ED1'],
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: true, formatter: '{b}\n{c}条' },
                data: [{"name": "14", "value": 644}, {"name": "13", "value": 250}, {"name": "255", "value": 81}, {"name": "24", "value": 1}]
            }]
        });
        
        // 每日趋势图
        var dailyChart = echarts.init(document.getElementById('dailyChart'));
        dailyChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: {
                type: 'category',
                data: ["04-09", "04-10", "04-11", "04-12", "04-13", "04-14", "04-15", "04-16", "04-17", "04-18", "04-19", "04-20", "04-21", "04-22", "04-23", "04-24", "04-25", "04-26", "04-27", "04-28", "04-29", "04-30", "05-01", "05-02", "05-03", "05-04", "05-05", "05-06", "05-07", "05-08"],
                axisLabel: { rotate: 45 }
            },
            yAxis: { type: 'value' },
            series: [{
                type: 'line',
                data: [37, 55, 12, 5, 47, 36, 53, 47, 54, 23, 3, 53, 74, 28, 38, 37, 11, 9, 49, 51, 57, 47, 5, 9, 10, 10, 9, 47, 35, 0],
                smooth: true,
                areaStyle: { color: 'rgba(51, 112, 255, 0.2)' },
                lineStyle: { color: '#3370FF', width: 2 },
                itemStyle: { color: '#3370FF' }
            }]
        });
        
        // 响应窗口变化
        window.addEventListener('resize', function() {
            stageChart.resize();
            scoreChart.resize();
            channelChart.resize();
            dailyChart.resize();
        });
    </script>
</body>
</html>
