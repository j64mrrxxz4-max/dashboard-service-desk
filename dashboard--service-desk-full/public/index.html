<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产业金融服务台运维监控仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F5F7FA;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #3370FF 0%, #0D47A1 100%);
            color: white;
            padding: 24px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header .update-time {
            font-size: 14px;
            opacity: 0.9;
        }
        .card-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card .label {
            font-size: 14px;
            color: #646A7B;
            margin-bottom: 8px;
        }
        .card .value {
            font-size: 32px;
            font-weight: 700;
            color: #3370FF;
        }
        .card .sub {
            font-size: 13px;
            color: #969BAB;
            margin-top: 4px;
        }
        .chart-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #1F2329;
            margin-bottom: 16px;
        }
        .chart {
            height: 280px;
        }
        .info-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .info-title {
            font-size: 16px;
            font-weight: 600;
            color: #1F2329;
            margin-bottom: 16px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #F1F3F5;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #646A7B;
        }
        .stat-value {
            font-weight: 600;
            color: #1F2329;
        }
        .stat-value a {
            color: #3370FF;
            text-decoration: none;
        }
        .stat-value a:hover {
            text-decoration: underline;
        }
        .legend {
            margin-top: 12px;
            font-size: 13px;
            color: #969BAB;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            font-size: 18px;
            color: #646A7B;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 产业金融服务台运维监控仪表盘</h1>
            <div class="update-time">正在加载数据...</div>
        </div>
        
        <div class="loading">
            ⏳ 仪表盘数据加载中，请稍候...
        </div>
    </div>
    
    <script>
        // 提示：此为模板文件，实际数据将由 GitHub Actions 每日自动更新
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.loading').innerHTML = 
                '📝 提示：此为模板文件<br>' +
                '实际数据将由 GitHub Actions 每天早上9点自动更新<br>' +
                '更新后会推送到 GitHub，Netlify 会自动部署新版本';
        });
    </script>
</body>
</html>
